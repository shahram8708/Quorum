{% if pagination and pagination.pages > 1 %}
<nav aria-label="Pagination" class="mt-3">
  <ul class="pagination">
    {% if pagination.has_prev %}
      <li class="page-item"><a class="page-link" href="{{ pagination_url(pagination.prev_num) }}">Previous</a></li>
    {% endif %}
    <li class="page-item disabled"><span class="page-link">Page {{ pagination.page }} / {{ pagination.pages }}</span></li>
    {% if pagination.has_next %}
      <li class="page-item"><a class="page-link" href="{{ pagination_url(pagination.next_num) }}">Next</a></li>
    {% endif %}
  </ul>
</nav>
{% endif %}
