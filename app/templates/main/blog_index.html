{% extends 'base.html' %}
{% block title %}Blog | Quorum{% endblock %}
{% block content %}
<div class="container py-5 mt-5">
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="{{ url_for('main.index') }}">Home</a></li>
      <li class="breadcrumb-item active" aria-current="page">Blog</li>
    </ol>
  </nav>

  <h1>Quorum Blog</h1>
  <div class="d-flex flex-wrap gap-2 mb-3">
    <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('main.blog_index', category='civic-action') }}">Civic Action</a>
    <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('main.blog_index', category='templates') }}">Templates</a>
    <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('main.blog_index', category='community') }}">Community</a>
  </div>
  <div class="row g-3 mt-2">
    {% for post in posts %}
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-body">
          <h5>{{ post.title }}</h5>
          <p class="text-muted">{{ post.excerpt }}</p>
          <a href="{{ url_for('main.blog_post', slug=post.slug) }}">Read article</a>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
  <a href="{{ url_for('main.index') }}" class="d-inline-block mt-4">Back to Home</a>
</div>
{% endblock %}
