{% extends 'base.html' %}
{% block title %}404 Not Found | Quorum{% endblock %}
{% block content %}
<div class="container py-5 mt-5 text-center">
  <h1>Page Not Found</h1>
  <p>The page you requested could not be found.</p>
  <div class="d-flex justify-content-center gap-2 flex-wrap">
    <a class="btn btn-primary" href="{{ url_for('main.index') }}">Go to Homepage</a>
    {% if current_user.is_authenticated %}
      <a class="btn btn-outline-secondary" href="{{ url_for('dashboard.home') }}">Go to Dashboard</a>
    {% endif %}
    <a class="btn btn-outline-secondary" href="{{ url_for('projects_public.board') }}">Browse Projects</a>
  </div>
</div>
{% endblock %}
