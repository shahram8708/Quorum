{% extends 'base.html' %}
{% block title %}Server Error | Quorum{% endblock %}
{% block content %}
<div class="container py-5 mt-5 text-center">
  <h1>Something went wrong</h1>
  <p>We're working on it. Please try again shortly.</p>
  <div class="d-flex justify-content-center gap-2 flex-wrap">
    <a class="btn btn-primary" href="{{ url_for('main.index') }}">Go to Homepage</a>
    {% if current_user.is_authenticated %}
      <a class="btn btn-outline-secondary" href="{{ url_for('dashboard.home') }}">Go to Dashboard</a>
    {% endif %}
  </div>
</div>
{% endblock %}
